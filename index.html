<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>君问的破站</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background-image: url("壁纸.png");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  background-repeat: no-repeat;
  color: #fff;
}

body {
  display: flex;
  flex-direction: column;
  padding-bottom: 90px;
}

.loader-wrapper {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #121826;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeOutLoader 0.6s 1.8s forwards;
}

.loader-logo {
  font-size: 26px;
  font-weight: 600;
  color: #a8b8ff;
  margin-bottom: 20px;
  opacity: 0;
  animation: logoFadeIn 0.8s 0.3s forwards;
}

.loader-bar {
  width: 200px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.loader-progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #6c7eff, #a8b8ff);
  animation: progress 1.2s 0.6s forwards;
}

@keyframes logoFadeIn {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes progress {
  to { width: 100%; }
}

@keyframes fadeOutLoader {
  to { opacity: 0; visibility: hidden; }
}

.wrapper {
  flex: 1;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 60px 20px;
  width: 100%;
}

.page {
  display: none;
}

.page.active {
  display: block;
  animation: fadeIn 0.3s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.title {
  font-size: 32px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 10px;
}

.desc {
  text-align: center;
  color: #a0a0c0;
  margin-bottom: 40px;
}

.card-group {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  width: 100%;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(40px) saturate(120%);
  -webkit-backdrop-filter: blur(40px) saturate(120%);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 18px;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
  position: relative;
  z-index: 1;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

@media (min-width: 768px) {
  .card { width: calc(50% - 10px); }
}

.card:hover {
  transform: scale(1.03);
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 32px rgba(110, 140, 255, 0.25);
  z-index: 2;
}

.card-top-img {
  width: 100%;
  height: 200px;
}

.card-top-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card-body {
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-info {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.name {
  font-size: 16px;
  font-weight: 500;
}

/* 卡片内部小标题 */
.card-subtitle {
  font-size: 12px;
  color: #a0a0c0;
}

.dl-btn {
  padding: 9px 16px;
  background: rgba(110, 140, 255, 0.2);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(160,180,255,0.3);
  border-radius: 12px;
  color: #fff;
  text-decoration: none;
  transition: all 0.25s ease;
  position: relative;
  z-index: 3;
}

.dl-btn:hover {
  background: rgba(110, 140, 255, 0.35);
  transform: translateY(-2px);
  box-shadow: 0 0 12px rgba(110, 140, 255, 0.25);
}

.social-page {
  min-height: 65vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  text-align: center;
}

.social-title {
  font-size: 30px;
  font-weight: 600;
}

.social-desc {
  font-size: 16px;
  color: #a0a0c0;
  margin-top: -20px;
}

.social-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 24px;
}

.social-item {
  width: 140px;
  height: 140px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(40px) saturate(120%);
  -webkit-backdrop-filter: blur(40px) saturate(120%);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 500;
  color: #e0e0e0;
  text-decoration: none;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}

.social-item:hover {
  transform: scale(1.08);
  background: rgba(255,255,255,0.1);
  box-shadow: 0 0 24px rgba(110, 140, 255, 0.3);
  border-color: rgba(110, 140, 255, 0.3);
  color: #fff;
}

.footer {
  text-align: center;
  margin-top: 40px;
  color: #999;
  font-size: 13px;
}

.duck-nav {
  position: fixed;
  left: 20px;
  right: 20px;
  bottom: 20px;
  height: 70px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(40px) saturate(120%);
  -webkit-backdrop-filter: blur(40px) saturate(120%);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 18px;
  display: flex;
  align-items: center;
  padding: 0 10px;
  z-index: 99;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
}

.duck-slider {
  position: absolute;
  left: 10px;
  top: 8px;
  width: calc(50% - 15px);
  height: calc(100% - 16px);
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 12px;
  transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
  z-index: 0;
}

.duck-item {
  flex: 1;
  text-align: center;
  font-size: 18px;
  font-weight: 500;
  color: #ccc;
  cursor: pointer;
  position: relative;
  z-index: 1;
  padding: 10px 0;
}

@media (min-width: 768px) {
  .duck-nav {
    left: 20px;
    top: 20px;
    bottom: 20px;
    right: auto;
    width: 70px;
    height: auto;
    flex-direction: column;
    padding: 10px 8px;
  }
  .duck-slider {
    left: 8px;
    top: 10px;
    width: calc(100% - 16px);
    height: calc(50% - 15px);
    transition: top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2);
  }
  .duck-item {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    padding: 0 10px;
    font-size: 17px;
  }
  .container {
    padding-left: 110px;
  }
}

.toast-popup {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(26, 26, 46, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  padding: 16px 20px;
  color: #fff;
  font-size: 15px;
  z-index: 999;
  transform: translateX(120%);
  transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 240px;
}

.toast-popup.show {
  transform: translateX(0);
}

.toast-close {
  background: none;
  border: none;
  color: #ccc;
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  transition: color 0.2s;
}

.toast-close:hover {
  color: #fff;
}
</style>
</head>

<body>

<div class="loader-wrapper">
  <div class="loader-logo">君问的破站</div>
  <div class="loader-bar"><div class="loader-progress"></div></div>
</div>

<div class="toast-popup" id="toast">
  <span>抖音废了，咱不看</span>
  <button class="toast-close" onclick="closeToast()">×</button>
</div>

<div class="wrapper">
  <div class="container">

    <div class="page active" id="page1">
      <div class="social-page">
        <h2 class="social-title">各平台账号</h2>
        <p class="social-desc">感谢关注，全平台@北辰ty</p>
        <div class="social-grid">
          <a class="social-item" href="https://www.coolapk.com/u/34727959" target="_blank">酷安</a>
          <a class="social-item" href="https://v.kuaishou.com/KwMVWf2P" target="_blank">快手</a>
          <a class="social-item" href="https://b23.tv/C8gkSN5" target="_blank">B站</a>
          <div class="social-item" onclick="showDyToast()">抖音</div>
        </div>
      </div>
      <div class="footer">© 2026 个人主页</div>
    </div>

    <div class="page" id="page2">
      <h2 class="title">资源仓库</h2>
      <p class="desc">刷机 / 工具</p>
      <div class="card-group">

        <div class="card">
          <div class="card-top-img">
            <img src="mido.png" alt="Redmi Note4X">
          </div>
          <div class="card-body">
            <div class="card-info">
              <div class="name">Redmi Note 4X (mido)</div>
              <div class="card-subtitle">大部分资源整理</div>
            </div>
            <a class="dl-btn" href="https://www.123865.com/s/RuGxTd-pFJl">下载</a>
          </div>
        </div>

        <div class="card">
          <div class="card-top-img">
            <img src="chiron.jpg" alt="小米MIX2">
          </div>
          <div class="card-body">
            <div class="card-info">
              <div class="name">XIAOMI MIX2（chiron）</div>
              <div class="card-subtitle">未完成</div>
            </div>
            <a class="dl-btn" href="未完成">下载</a>
          </div>
        </div>

        <div class="card">
          <div class="card-top-img">
            <img src="教程.jpg" alt="教程">
          </div>
          <div class="card-body">
            <div class="card-info">
              <div class="name">刷机教程</div>
              <div class="card-subtitle">图文，评论区置顶补充问题/教程导航</div>
            </div>
            <a class="dl-btn" href="https://www.coolapk.com/feed/70395985?s=MDQ1ZGYzMmUyMTFlODE3ZzY5ZDJmNWZiega1613">下载</a>
          </div>
        </div>

        <div class="card">
          <div class="card-top-img">
            <img src="盖房子.jpg" alt="工具">
          </div>
          <div class="card-body">
            <div class="card-info">
              <div class="name">未完成</div>
              <div class="card-subtitle">待更新</div>
            </div>
            <a class="dl-btn" href="未完成">下载</a>
          </div>
        </div>

      </div>
      <div class="footer">© 2026 资源导航</div>
    </div>

  </div>
</div>

<div class="duck-nav">
  <div class="duck-slider" id="slider"></div>
  <div class="duck-item" onclick="goPage(1)">首页</div>
  <div class="duck-item" onclick="goPage(2)">资源</div>
</div>

<script>
const slider = document.getElementById('slider');
const toast = document.getElementById('toast');
let toastTimer;

function goPage(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page'+n).classList.add('active');

  if (window.innerWidth >= 768) {
    slider.style.top = n === 1 ? '10px' : 'calc(50% + 5px)';
  } else {
    slider.style.left = n === 1 ? '10px' : 'calc(50% + 5px)';
  }
}

function showDyToast() {
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    closeToast();
  }, 3000);
}

function closeToast() {
  toast.classList.remove('show');
  clearTimeout(toastTimer);
}
</script>

</body>
</html>
